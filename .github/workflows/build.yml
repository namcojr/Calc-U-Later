name: Build Desktop

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

# All commands run inside the Flutter project folder.
defaults:
  run:
    working-directory: desktop

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  # ----------------------------------------------------------------- Linux
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
        working-directory: .
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter test
      - name: Package (tarball + AppImage)
        run: |
          chmod +x linux/packaging/package_linux.sh linux/packaging/AppRun
          ./linux/packaging/package_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.tar.gz

  # --------------------------------------------------------------- Windows
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter test
      - run: flutter build windows --release
      - name: Zip release bundle
        shell: pwsh
        run: |
          $ver = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)\+').Matches[0].Groups[1].Value
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dist/Calc-U-Later-$ver-windows-x64.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: desktop/dist/*.zip

  # ----------------------------------------------------------------- macOS
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter test
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          brew install create-dmg
          ver=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          app=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          mkdir -p dist
          create-dmg \
            --volname "Calc-U-Later" \
            --window-size 480 300 \
            --icon-size 100 \
            --app-drop-link 340 120 \
            --icon "$(basename "$app")" 140 120 \
            "dist/Calc-U-Later-$ver-macos.dmg" \
            "$app" || \
          hdiutil create -volname "Calc-U-Later" -srcfolder "$app" \
            -ov -format UDZO "dist/Calc-U-Later-$ver-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: desktop/dist/*.dmg
